<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#009688">
  <meta name="description" content="Arcade maintenance log and tracking system">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23009688' rx='20' width='100' height='100'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>🎮</text></svg>">
  <title>Arcade Maintenance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      padding-top: max(0px, var(--sat));
      padding-bottom: var(--sab);
    }

    /* Active nav button */
    .nav-btn.active {
      background-color: #009688 !important;
      color: white !important;
    }

    /* Iframe container fills remaining space */
    #iframeContainer {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #iframeContainer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Loading overlay */
    #loadingOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f4f6;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    #loadingOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Top Navigation Bar -->
  <header class="bg-white border-b border-gray-200 shadow-sm z-50">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <i class="fas fa-gamepad text-[#009688] text-2xl"></i>
          <h1 class="text-lg font-bold text-gray-800">Arcade Maintenance</h1>
        </div>
        <nav class="flex items-center gap-2">
          <button onclick="navigateTo('page1')" data-page="page1" class="nav-btn active px-3 py-1.5 bg-[#009688] text-white rounded-lg text-sm font-medium transition-colors">
            <i class="fas fa-home mr-1"></i> <span class="hidden sm:inline">Home</span>
          </button>
          <button onclick="navigateTo('dashboard')" data-page="dashboard" class="nav-btn px-3 py-1.5 bg-gray-200 text-gray-700 hover:bg-gray-300 rounded-lg text-sm font-medium transition-colors">
            <i class="fas fa-chart-line mr-1"></i> <span class="hidden sm:inline">Dashboard</span>
          </button>
          <button onclick="navigateTo('page3')" data-page="page3" class="nav-btn px-3 py-1.5 bg-gray-200 text-gray-700 hover:bg-gray-300 rounded-lg text-sm font-medium transition-colors">
            <i class="fas fa-cog mr-1"></i> <span class="hidden sm:inline">Customize</span>
          </button>
        </nav>
      </div>
    </div>
  </header>

  <!-- Iframe Container -->
  <div id="iframeContainer">
    <!-- Loading overlay shown while iframe loads -->
    <div id="loadingOverlay">
      <div class="text-center">
        <i class="fas fa-circle-notch text-5xl text-[#009688] loading-spinner mb-4 block"></i>
        <h2 class="text-xl font-semibold text-gray-800 mb-2">Loading Arcade Maintenance...</h2>
        <p class="text-gray-500">Please wait while the app loads</p>
      </div>
    </div>

    <iframe
      id="appFrame"
      src=""
      allow="clipboard-write; clipboard-read"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
      loading="eager"
    ></iframe>
  </div>

  <script>
    // ===========================================
    // GAS SCRIPT URL - EDIT THIS ONE PLACE
    // ===========================================
    const GAS_URL = 'https://script.google.com/a/macros/fegllc.com/s/AKfycbwd5Kg_rThwjZKTaTrAojETY3Xm7bAKM-VD6SP1jQwKxzJp5wysMzstVn4tibRy4VWD/exec';

    // Map GitHub Pages paths to GAS page parameters
    const PATH_TO_PAGE = {
      '/': 'page1',
      '/index.html': 'page1',
      '/home': 'page1',
      '/dashboard': 'dashboard',
      '/customize': 'page3'
    };

    const iframe = document.getElementById('appFrame');
    const loadingOverlay = document.getElementById('loadingOverlay');

    // Get page from URL path
    function getPageFromPath() {
      const path = window.location.pathname;
      return PATH_TO_PAGE[path] || 'page1';
    }

    // Get page parameter from URL (for backward compatibility)
    const urlParams = new URLSearchParams(window.location.search);
    let currentPage = urlParams.get('page') || getPageFromPath();

    // Update active nav button
    function updateNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.dataset.page === currentPage) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    // Load a page into the iframe
    function loadPage(pageName) {
      // Show loading overlay
      loadingOverlay.classList.remove('hidden');

      // Set iframe src to the GAS URL with the page parameter
      iframe.src = GAS_URL + '?page=' + pageName;
    }

    // Hide loading overlay when iframe finishes loading
    iframe.addEventListener('load', function() {
      loadingOverlay.classList.add('hidden');
    });

    // Navigation function - loads page in iframe instead of redirecting
    function navigateTo(pageName) {
      currentPage = pageName;
      updateNav();

      // Update browser URL without reload
      const newUrl = window.location.pathname + '?page=' + pageName;
      window.history.pushState({ page: pageName }, '', newUrl);

      // Load in iframe
      loadPage(pageName);
    }

    // Handle browser back/forward
    window.addEventListener('popstate', function(event) {
      const urlParams = new URLSearchParams(window.location.search);
      const page = urlParams.get('page') || 'page1';
      currentPage = page;
      updateNav();
      loadPage(page);
    });

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      updateNav();

      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
          .then((registration) => {
            console.log('PWA: Service Worker registered:', registration.scope);

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  if (confirm('A new version is available. Reload to update?')) {
                    window.location.reload();
                  }
                }
              });
            });
          })
          .catch((error) => {
            console.log('PWA: Service Worker registration failed:', error);
          });
      }

      // Load the current page into the iframe
      loadPage(currentPage);
    });
  </script>
</body>
</html>
